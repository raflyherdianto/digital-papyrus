name: Deploy Frontend to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Remove uploads folder to prevent SCP permission issues
        run: rm -rf frontend/public/uploads

      - name: Copy frontend files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "frontend"
          target: "/home/${{ secrets.EC2_USERNAME }}/digital-papyrus"

      - name: Execute deployment on EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Ensure shared network exists
            docker network inspect shared-network >/dev/null 2>&1 || docker network create shared-network
            
            # Ensure frontend directory exists and navigate to it
            mkdir -p /home/${{ secrets.EC2_USERNAME }}/digital-papyrus/frontend
            cd /home/${{ secrets.EC2_USERNAME }}/digital-papyrus/frontend
            
            # Ensure upload folder exists for volume mapping
            mkdir -p public/uploads
            
            # Build and deploy FE container detached, forcing a rebuild
            docker compose up -d --build