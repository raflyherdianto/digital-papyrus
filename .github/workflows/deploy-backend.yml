name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Backend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy backend files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "backend"
          target: "/home/${{ secrets.EC2_USERNAME }}/digital-papyrus"

      - name: Execute deployment on EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          BACKEND_ENV: ${{ secrets.BACKEND_ENV }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: BACKEND_ENV
          script: |
            # Ensure shared network exists
            docker network inspect shared-network >/dev/null 2>&1 || docker network create shared-network
            
            # Ensure backend directory exists and navigate to it
            mkdir -p /home/${{ secrets.EC2_USERNAME }}/digital-papyrus/backend
            cd /home/${{ secrets.EC2_USERNAME }}/digital-papyrus/backend

            # Create .env file dynamically from GitHub Secrets
            echo "$BACKEND_ENV" > .env
            
            # WIPE DATABASE COMMAND (AS REQUESTED)
            # CAUTION: Please remove this line after your next push so you don't wipe the DB on every deployment!
            sudo rm -rf data
            
            # Safely create data directory for SQLite mounting and fix permissions
            mkdir -p data
            mkdir -p ../frontend/public/uploads
            chmod 777 data
            chmod 777 ../frontend/public/uploads
            
            # Build and deploy BE container detached, forcing a rebuild
            docker compose up -d --build