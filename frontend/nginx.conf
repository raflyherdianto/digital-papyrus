server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Important for trailing slash paths in Astro static builds
    # and SPA fallback if needed.
    location / {
        try_files $uri $uri/index.html $uri.html =404;
    }

    # Error pages
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}